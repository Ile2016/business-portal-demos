<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Portal Demos</title>

    <style>
        body {
            font-family: Segoe UI, Arial, sans-serif;
            background: #f5f7fa;
            margin: 0;
            padding: 40px;
        }

        h1 {
            color: #2a2a2a;
            margin-bottom: 10px;
        }

        p {
            color: #666;
        }

        .demo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .demo-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: transform 0.2s ease;
        }

        .demo-card:hover {
            transform: translateY(-4px);
        }

        .demo-card h2 {
            margin-top: 0;
        }

        .demo-card a {
            display: inline-block;
            margin-top: 12px;
            color: white;
            background: #0078d4;
            text-decoration: none;
            padding: 10px 16px;
            border-radius: 6px;
        }

        .demo-card a:hover {
            background: #106ebe;
        }
    </style>
</head>
<body>

<h1>🚀 Business Portal Demos</h1>

<p>GitHub Pages -demot ja prototyypit.</p>

<div class="demo-grid">

   
<div class="demo-card">

</div>

</div>


</div>

</body>
</html>
