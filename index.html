<!doctype html>
<html lang="fi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MTY Assets Dashboard V3</title>
<style>
:root{
  --telia-purple:#4b286d;--telia-deep:#2d1844;--telia-magenta:#e20074;--bg:#f6f4f8;--surface:rgba(255,255,255,.92);
  --surface-2:#ffffff;--border:#e8e3ed;--text:#1a1a1a;--muted:#6b7280;--shadow:0 16px 50px rgba(75,40,109,.10);
  --shadow-strong:0 18px 55px rgba(75,40,109,.20);--radius:28px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:
  radial-gradient(circle at top right,rgba(226,0,116,.08),transparent 22%),
  radial-gradient(circle at top left,rgba(75,40,109,.12),transparent 22%),var(--bg);color:var(--text)}
.page{max-width:1380px;margin:0 auto;padding:24px}
.hero{position:relative;overflow:hidden;background:linear-gradient(135deg,var(--telia-purple),#371f51 62%,var(--telia-magenta));color:#fff;border-radius:36px;padding:30px;box-shadow:var(--shadow-strong)}
.hero:before,.hero:after{content:"";position:absolute;border-radius:999px;filter:blur(20px)}
.hero:before{right:-60px;top:-50px;width:220px;height:220px;background:rgba(255,255,255,.10)}
.hero:after{right:40px;bottom:-80px;width:260px;height:260px;background:rgba(255,255,255,.08)}
.hero-grid{display:grid;grid-template-columns:1.45fr .95fr;gap:24px;position:relative;z-index:1}
.eyebrow{display:inline-flex;gap:8px;align-items:center;border-radius:999px;padding:8px 12px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.16);font-size:12px;font-weight:700;letter-spacing:.03em}
h1{margin:14px 0 8px;font-size:clamp(30px,5vw,58px);line-height:1.02;letter-spacing:-.03em}
.hero p{max-width:760px;color:rgba(255,255,255,.86);line-height:1.65;margin:0}
.cta,.lang-switch,.filters,.view-switch,.inline-actions{display:flex;gap:10px;flex-wrap:wrap}
.cta{margin-top:22px}
.btn{border:0;border-radius:18px;padding:13px 18px;font-weight:700;cursor:pointer;font-size:14px;transition:.2s ease;font-family:inherit}
.btn:hover{transform:translateY(-1px)}
.btn-primary{background:#fff;color:var(--telia-deep)}
.btn-soft{background:rgba(255,255,255,.10);color:#fff;border:1px solid rgba(255,255,255,.18)}
.side-card{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.12);border-radius:var(--radius);padding:18px;backdrop-filter:blur(12px)}
.side-card h3{margin:0;font-size:18px}.side-card p{margin:6px 0 14px;color:rgba(255,255,255,.72);font-size:14px}
.highlight{border-radius:22px;background:rgba(255,255,255,.10);padding:14px;margin-bottom:12px}
.highlight .label{font-size:13px;color:rgba(255,255,255,.72)}.highlight .value{margin-top:4px;font-size:24px;font-weight:700}
.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.kpis{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:16px;margin-top:18px}
.kpi{background:rgba(255,255,255,.82);border:1px solid rgba(255,255,255,.65);backdrop-filter:blur(12px);border-radius:var(--radius);box-shadow:0 12px 40px rgba(75,40,109,.10);padding:18px}
.kpi .label{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}.kpi .value{font-size:34px;font-weight:700;margin-top:10px}.kpi .hint{font-size:14px;color:var(--muted);margin-top:6px}
.toolbar{margin-top:18px;background:rgba(255,255,255,.86);border:1px solid rgba(255,255,255,.65);backdrop-filter:blur(12px);border-radius:30px;box-shadow:var(--shadow);padding:18px}
.toolbar-row{display:flex;justify-content:space-between;gap:14px;align-items:center;flex-wrap:wrap}.left-tools{display:flex;gap:12px;align-items:center;flex-wrap:wrap;width:100%}.right-tools{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.search-wrap{position:relative;flex:1 1 520px}.search-wrap input{width:100%;height:50px;border-radius:18px;border:1px solid #e2e8f0;background:#f8fafc;padding:0 16px 0 42px;font-size:15px;outline:none}.search-wrap .icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#94a3b8}
.filters button,.view-switch button,.lang-switch button{border-radius:16px;padding:11px 14px;border:1px solid #e2e8f0;background:#fff;color:#334155;font-weight:700;cursor:pointer;font-family:inherit}
.filters button.active,.lang-switch button.active{background:var(--telia-purple);border-color:var(--telia-purple);color:#fff}
.view-switch{background:#f8fafc;border:1px solid #e2e8f0;border-radius:18px;padding:4px}.view-switch button{border:none;background:transparent;font-weight:700}.view-switch button.active{background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.06)}
.info{margin-top:12px;font-size:14px;color:var(--muted)}
.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px;margin-top:16px}
.card{background:var(--surface);border:1px solid rgba(255,255,255,.70);backdrop-filter:blur(12px);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;transition:transform .24s ease, box-shadow .24s ease}
.card:hover{transform:translateY(-4px);box-shadow:0 18px 55px rgba(75,40,109,.16)}.card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:14px}
.offer{display:inline-block;padding:8px 12px;border-radius:999px;font-size:11px;font-weight:700;border:1px solid transparent}.offer.new{background:#ede9fe;color:#6d28d9;border-color:#ddd6fe}.offer.legacy{background:#fce7f3;color:#be185d;border-color:#fbcfe8}.offer.devices{background:#e0f2fe;color:#0369a1;border-color:#bae6fd}
.asset-icon{width:48px;height:48px;border-radius:18px;display:grid;place-items:center;background:linear-gradient(135deg,#4b286d,#e20074);color:#fff;font-size:22px;box-shadow:0 8px 18px rgba(75,40,109,.20)}
.asset-title{font-size:23px;font-weight:700;line-height:1.15}.asset-user{margin-top:6px;color:var(--muted);font-size:14px;min-height:20px}
.meta{margin-top:16px;background:#f8fafc;border-radius:18px;padding:14px;display:grid;gap:10px}.meta-row{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.meta-row span:first-child{font-size:14px;color:var(--muted)}.meta-row span:last-child{font-size:14px;font-weight:600;text-align:right}
.card-foot{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:16px}.pill{display:inline-block;padding:7px 10px;border-radius:999px;font-size:12px;font-weight:700;background:#f5f3ff;color:#5b21b6}.price{font-size:20px;font-weight:700}
.inline-actions{margin-top:14px}.mini-btn{border:1px solid #e2e8f0;background:#fff;color:#334155;padding:9px 11px;border-radius:14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.list-view{display:none;margin-top:16px}.list-group{background:var(--surface);border:1px solid rgba(255,255,255,.70);backdrop-filter:blur(12px);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:18px}
.list-head{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:18px 18px 8px}.list-head h3{margin:0;font-size:22px}.list-head p{margin:4px 0 0;color:var(--muted);font-size:14px}
.table-wrap{overflow:auto} table{width:100%;border-collapse:collapse} thead{background:#f8fafc} th{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-weight:600;text-align:left;padding:16px;border-top:1px solid #e2e8f0;border-bottom:1px solid #e2e8f0} td{padding:16px;border-bottom:1px solid #f1f5f9;vertical-align:top} tbody tr:last-child td{border-bottom:none} tbody tr:hover{background:#fafafa}.asset-cell{display:flex;gap:12px;align-items:flex-start}.small-icon{width:40px;height:40px;border-radius:16px;display:grid;place-items:center;background:linear-gradient(135deg,#4b286d,#e20074);color:#fff}.sub{margin-top:3px;font-size:13px;color:var(--muted)}
.empty{display:none;margin-top:16px;background:rgba(255,255,255,.88);border:1px dashed #cbd5e1;border-radius:var(--radius);padding:40px;text-align:center;color:var(--muted);box-shadow:var(--shadow)}
.empty h3{color:#111827;margin-top:0}
.footer-note{margin-top:14px;font-size:12px;color:var(--muted);text-align:center}
@media (max-width:1140px){.hero-grid,.grid{grid-template-columns:1fr 1fr}.kpis{grid-template-columns:repeat(3,minmax(0,1fr))}}
@media (max-width:860px){.hero-grid,.grid,.kpis,.two{grid-template-columns:1fr}.page{padding:16px}.hero{padding:22px}.toolbar-row{align-items:flex-start}}
</style>
</head>
<body>
<div class="page">
  <section class="hero">
    <div class="hero-grid">
      <div>
        <div id="eyebrow" class="eyebrow"></div>
        <h1 id="heroTitle"></h1>
        <p id="heroDesc"></p>
        <div class="cta">
          <button id="cta1" class="btn btn-primary"></button>
          <button id="cta2" class="btn btn-soft"></button>
          <button id="cta3" class="btn btn-soft"></button>
        </div>
      </div>
      <div class="side-card">
        <h3 id="highlightsTitle"></h3>
        <p id="highlightsDesc"></p>
        <div class="highlight"><div id="highestPriceLabel" class="label"></div><div id="topAsset" class="value"></div><div id="topPrice" class="label" style="margin-top:6px"></div></div>
        <div class="two">
          <div class="highlight"><div id="voiceCountLabel" class="label"></div><div id="voiceCountValue" class="value"></div></div>
          <div class="highlight"><div id="mbbCountLabel" class="label"></div><div id="mbbCountValue" class="value"></div></div>
        </div>
        <div class="highlight"><div id="deviceCountLabel" class="label"></div><div id="deviceCountValue" class="value"></div></div>
      </div>
    </div>
  </section>

  <section class="kpis">
    <div class="kpi"><div id="kpiTotalLabel" class="label"></div><div id="kpiTotalValue" class="value"></div><div id="kpiTotalHint" class="hint"></div></div>
    <div class="kpi"><div id="kpiNewLabel" class="label"></div><div id="kpiNewValue" class="value"></div><div id="kpiNewHint" class="hint"></div></div>
    <div class="kpi"><div id="kpiLegacyLabel" class="label"></div><div id="kpiLegacyValue" class="value"></div><div id="kpiLegacyHint" class="hint"></div></div>
    <div class="kpi"><div id="kpiDevicesLabel" class="label"></div><div id="kpiDevicesValue" class="value"></div><div id="kpiDevicesHint" class="hint"></div></div>
    <div class="kpi"><div id="kpiResultsLabel" class="label"></div><div id="kpiResultsValue" class="value"></div><div id="kpiResultsHint" class="hint"></div></div>
  </section>

  <section class="toolbar">
    <div class="toolbar-row">
      <div class="left-tools">
        <div class="lang-switch">
          <button id="langEn" class="active">EN</button>
          <button id="langFi">FI</button>
        </div>
        <div class="search-wrap">
          <span class="icon">🔎</span>
          <input id="searchInput" type="text" />
        </div>
      </div>
      <div class="right-tools">
        <div class="filters">
          <button class="filter-btn active" data-filter="all"></button>
          <button class="filter-btn" data-filter="new"></button>
          <button class="filter-btn" data-filter="legacy"></button>
          <button class="filter-btn" data-filter="devices"></button>
        </div>
        <div class="view-switch">
          <button id="cardsBtn" class="active"></button>
          <button id="listBtn"></button>
        </div>
      </div>
    </div>
    <div id="info" class="info"></div>
  </section>

  <section id="cardsView" class="grid"></section>
  <section id="listView" class="list-view"></section>
  <section id="emptyState" class="empty"><h3 id="emptyTitle"></h3><p id="emptyDesc"></p></section>
  <div class="footer-note">Standalone HTML demo · local file · no backend required</div>
</div>

function t(){ return translations[currentLang]; }
function priceNum(v){ const m=String(v||'').replace(/\s/g,'').match(/(\d+[\.,]?\d*)/); return m ? Number(m[1].replace(',','.')) : 0; }

  document.getElementById('topAsset').textContent = top.asset;
  document.getElementById('topPrice').textContent = top.price;
  document.getElementById('voiceCountValue').textContent = items.filter(i=>i.segmentKey==='voice').length;
  document.getElementById('mbbCountValue').textContent = items.filter(i=>i.segmentKey==='mbb').length;
  document.getElementById('deviceCountValue').textContent = items.filter(i=>i.kind==='device').length + ' ' + t().deviceCountSuffix;
  document.getElementById('kpiTotalValue').textContent = items.length;
  document.getElementById('kpiNewValue').textContent = items.filter(i=>i.offerKey==='new').length;
  document.getElementById('kpiLegacyValue').textContent = items.filter(i=>i.offerKey==='legacy').length;
  document.getElementById('kpiDevicesValue').textContent = items.filter(i=>i.kind==='device').length;
}
function renderCards(data){
  els.cards.innerHTML = data.map(item => {
    const l1 = item.kind === 'device' ? t().metaDeviceContract : t().metaType;
    const v1 = item.kind === 'device' ? contractLabel(item) || '—' : typeLabel(item) || '—';
    const l2 = item.kind === 'device' ? t().metaDeviceValid : t().metaContract;
    const v2 = item.kind === 'device' ? (item.valid || '—') : ((contractLabel(item) && item.valid) ? (contractLabel(item) + ' · ' + item.valid) : (contractLabel(item) || item.valid || '—'));
    return `<article class="card"><div class="card-head"><span class="offer ${offerClass(item)}">${offerLabel(item)}</span><div class="asset-icon">${icon(item)}</div></div><div class="asset-title">${item.asset}</div><div class="asset-user">👤 ${item.user || t().noUser}</div><div class="meta"><div class="meta-row"><span>${l1}</span><span>${v1}</span></div><div class="meta-row"><span>${l2}</span><span>${v2}</span></div></div><div class="card-foot"><span class="pill">${segmentLabel(item)}</span><span class="price">${item.price}</span></div><div class="inline-actions"><button class="mini-btn">${t().actionOpen}</button><button class="mini-btn">${t().actionFault}</button><button class="mini-btn">${t().actionManage}</button></div></article>`;
  }).join('');
}
function listGroups(data){
  return [
    { title: t().groupNew, key:'new', rows:data.filter(i=>i.offerKey==='new') },
    { title: t().groupLegacy, key:'legacy', rows:data.filter(i=>i.offerKey==='legacy') },
    { title: t().groupDevices, key:'devices', rows:data.filter(i=>i.offerKey==='devices') }
  ].filter(g=>g.rows.length);
}
function renderList(data){
  els.list.innerHTML = listGroups(data).map(group => `<div class="list-group"><div class="list-head"><div><h3>${group.title}</h3><p>${group.rows.length} ${t().assetsWord}</p></div><span class="offer ${group.key}">${group.title}</span></div><div class="table-wrap"><table><thead><tr><th>${t().tableAsset}</th><th>${t().tableUser}</th><th>${t().tableType}</th><th>${t().tableValid}</th><th style="text-align:right">${t().tablePrice}</th></tr></thead><tbody>${group.rows.map(item => `<tr><td><div class="asset-cell"><div class="small-icon">${icon(item)}</div><div><div><strong>${item.asset}</strong></div><div class="sub">${segmentLabel(item)}</div></div></div></td><td>${item.user || t().noUser}</td><td>${item.kind==='device' ? (contractLabel(item) || '—') : (typeLabel(item) || '—')}</td><td>${item.valid || contractLabel(item) || '—'}</td><td style="text-align:right"><strong>${item.price}</strong></td></tr>`).join('')}</tbody></table></div></div>`).join('');
}
function render(){
  setStaticText();
  setupStats();
  const data = filtered();
  document.getElementById('kpiResultsValue').textContent = data.length;
  document.getElementById('kpiResultsHint').textContent = els.search.value.trim() ? `${t().kpiResultsHintSearch}: “${els.search.value.trim()}”` : t().kpiResultsHintAll;
  els.info.textContent = (els.search.value.trim() || currentFilter !== 'all') ? `${t().resultFiltered} ${data.length} ${t().assetsWord}.` : `${t().resultAll} ${data.length} ${t().assetsWord}.`;
  els.empty.style.display = data.length ? 'none' : 'block';
  if(currentView === 'cards'){ els.cards.style.display = data.length ? 'grid' : 'none'; els.list.style.display = 'none'; renderCards(data); }
  else { els.cards.style.display = 'none'; els.list.style.display = data.length ? 'block' : 'none'; renderList(data); }
}
document.querySelectorAll('.filter-btn').forEach(btn => btn.addEventListener('click', () => { currentFilter = btn.dataset.filter; document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); render(); }));
els.cardsBtn.addEventListener('click', () => { currentView='cards'; els.cardsBtn.classList.add('active'); els.listBtn.classList.remove('active'); render(); });
els.listBtn.addEventListener('click', () => { currentView='list'; els.listBtn.classList.add('active'); els.cardsBtn.classList.remove('active'); render(); });
els.langEn.addEventListener('click', () => { currentLang='en'; els.langEn.classList.add('active'); els.langFi.classList.remove('active'); render(); });
els.langFi.addEventListener('click', () => { currentLang='fi'; els.langFi.classList.add('active'); els.langEn.classList.remove('active'); render(); });
els.search.addEventListener('input', render);
render();
</script>
</body>
</html>
