<!DOCTYPE html> 

<html lang="fi"> 

<head> 

    <meta charset="UTF-8"> 

    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 

    <title>Business Portal Demos</title> 

 

    <style> 

        body { 

            font-family: "Segoe UI", Arial, sans-serif; 

            background: #f5f7fa; 

            margin: 0; 

            padding: 40px; 

            color: #2a2a2a; 

        } 

 

        h1 { 

            margin-bottom: 10px; 

        } 

 

        p { 

            color: #666; 

        } 

 

        .demo-grid { 

            display: grid; 

            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 

            gap: 20px; 

            margin-top: 30px; 

        } 

 

        .demo-card { 

            background: white; 

            padding: 24px; 

            border-radius: 12px; 

            box-shadow: 0 2px 8px rgba(0,0,0,0.08); 

        } 

 

        .demo-card h2 { 

            margin-top: 0; 

        } 

 

        .demo-link { 

            display: inline-block; 

            margin-top: 15px; 

            padding: 10px 16px; 

            background: #0078d4; 

            color: white; 

            text-decoration: none; 

            border-radius: 6px; 

            font-weight: 600; 

        } 

 

        .demo-link:hover { 

            background: #106ebe; 

        } 

    </style> 

</head> 

<body> 

 

<h1>🚀 Business Portal Demos</h1> 

<p>GitHub Pages -demot ja prototyypit.</p> 

 

<div class="demo-grid"> 

 

    <div class="demo-card"> 

        <h2>Global Search</h2> 

        <p>Hakutoiminnallisuuden demo.</p> 

 

        <a class="demo-link" href="./global-search/">Avaa demo</a> 

    </div> 

 

    <div class="demo-card"> 

        <h2>MTY Small Customer Demo</h2> 

        <p>Pienyritysasiakkaan näkymä.</p> 

 

        <a class="demo-link" href="./mty-small-cust-demo/">Avaa demo</a> 

    </div> 

 

</div> 

 

</body> 

</html>
