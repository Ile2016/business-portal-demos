  const deburr = (s) => s.normalize('NFD').replace(/[̀-ͯ]/g, '').toLowerCase();
  const input = document.getElementById('globalSearch');
  const predictive = document.getElementById('predictive');
  const results = document.getElementById('results');

  function searchAll(q) {
    const nq = deburr(q);
    const bySection = {};
    for (const item of DATA.master) {
      if (!q || deburr(item.keywords).includes(nq)) (bySection[item.section] ||= []).push(item);
    }
    return bySection;
  }

  function renderPredictive(bySection) {
    predictive.innerHTML = '';
    const sections = Object.keys(bySection).sort();
    if (sections.length === 0) { predictive.classList.remove('open'); return; }
    sections.forEach(sec => {
      const group = document.createElement('div'); group.className='group';
      const h = document.createElement('h4'); h.textContent = sec + ' ('+bySection[sec].length+')'; group.appendChild(h);
      bySection[sec].slice(0,5).forEach(it => {
        const div = document.createElement('div'); div.className='item'; div.textContent = it.title;
        div.addEventListener('click', () => openDetail(it)); group.appendChild(div);
      });
      predictive.appendChild(group);
    });
    predictive.classList.add('open');
  }

  function renderResults(bySection) {
    results.innerHTML = '';
    const sections = Object.keys(bySection).sort();
    if (sections.length === 0) { results.innerHTML = '<div class="hint">Ei hakutuloksia.</div>'; return; }
    sections.forEach(sec => {
      const wrap = document.createElement('section'); wrap.className='section';
      const h = document.createElement('h3'); h.innerHTML = sec + ' <span class="badge">'+bySection[sec].length+'</span>'; wrap.appendChild(h);
      bySection[sec].slice(0,50).forEach(it => {
        const a = document.createElement('a'); a.href='#'; a.textContent = it.title; a.style.display='block'; a.style.margin='6px 0';
        a.addEventListener('click', e => { e.preventDefault(); openDetail(it); });
        wrap.appendChild(a);
      });
      results.appendChild(wrap);
    });
  }

  input.addEventListener('input', e => { const q=e.target.value.trim(); if(q.length<2){predictive.classList.remove('open');return;} renderPredictive(searchAll(q)); });
  input.addEventListener('change', e => { renderResults(searchAll(e.target.value.trim())); });
  document.addEventListener('click', e => { if(!predictive.contains(e.target) && e.target!==input) predictive.classList.remove('open'); });

  // ===== Table-based list views =====
  const toolbar = document.querySelector('.toolbar');
  toolbar.addEventListener('click', e => {
    const btn = e.target.closest('button'); if(!btn) return;
    toolbar.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const view = btn.dataset.view;
    if (view === 'Uutiset') { showUutiset(); return; }
    showList(view);
  });

  function showUutiset() { results.innerHTML=''; document.getElementById('uutisetPane').scrollIntoView({behavior:'smooth'}); }

  function showList(view) {
    const keyMap = {
      'Liittymät ja Palvelut': 'Liittymät_ja_Palvelut',
      'Tilaukset': 'Tilaukset',
      'Laskut': 'Laskut',
      'Laskutilit': 'Laskutilit',
      'Palvelupyynnöt': 'Palvelupyynnöt',
      'Vikailmoitukset': 'Vikailmoitukset'
    };
    const key = keyMap[view];
    const data = DATA[key] || [];

    results.innerHTML = '';
    const controls = document.createElement('div'); controls.className='list-controls';
    const si = document.createElement('input'); si.className='search-input list-search'; si.placeholder='Hae tästä listasta…';
    const count = document.createElement('div'); count.className='hint'; count.textContent=data.length+' riviä';
    controls.appendChild(si); controls.appendChild(count); results.appendChild(controls);

    const wrap = document.createElement('div'); wrap.className='table-wrap'; results.appendChild(wrap);

    const preferred = {
      'Tilaukset': ['Yritys','Yrityksen nimi','Tilattu tuote','Liittymänumero/laite/lisenssi','Käyttäjä','Laskutili','Tilauspäivä','Tilauksen status'],
      'Laskut': ['Laskun numero','Yrityksen nimi','Laskun tyyppi','Summa','Laskun status','Laskun päivämäärä','Laskutili','Viitenumero'],
      'Liittymät_ja_Palvelut': ['Yritys','Yrityksen nimi','Tuote','Liittymänumero/laite/lisenssi','Käyttäjä','Liittymätyyppi/Nopeus','Määräaikainen sopimus'],
      'Laskutilit': ['Yritys','Yrityksen nimi','Laskutili','Laskutusosoite','Laskutustapa','Asiakasviite'],
      'Palvelypyynnöt': ['Yritys','Yrityksen nimi','Pyyntölaji','Kuvaus','Pyyntöpäivä','Status','Luonut'],
      'Vikailmoitukset': ['Yritys','Yrityksen nimi','Vikakategoria','Kuvaus','Aloituspäivä','Status']
    };

    const allCols = data.length ? Object.keys(data[0]) : [];
    const pref = preferred[key] || [];
    const other = allCols.filter(c => pref.indexOf(c)===-1);
    const cols = pref.concat(other);

    let shown = 20;

    function renderTable(filter) {
      filter = filter || '';
      const nf = deburr(filter);
      const filtered = data.filter(r => !filter || deburr(Object.values(r).join(' ')).includes(nf));
      count.textContent = filtered.length+' riviä';

      let h = '<table><thead><tr>' + cols.map(c=>'<th>'+c+'</th>').join('') + '</tr></thead><tbody>';
      filtered.slice(0, shown).forEach((row, i) => {
        h += '<tr data-idx="'+i+'">' + cols.map(c=>'<td>'+ (row[c]||'') +'</td>').join('') + '</tr>';
      });
      h += '</tbody></table>';
      wrap.innerHTML = h;

      wrap.querySelectorAll('tbody tr').forEach(tr => {
        tr.addEventListener('click', () => {
          const idx = parseInt(tr.getAttribute('data-idx'),10);
          const row = filtered[idx];
          openDetail({ title: view + ' – ' + Object.values(row).slice(0,3).join(' – '), record: row });
        });
      });

      btnMore.style.display = (shown < filtered.length) ? 'inline-block' : 'none';
    }

    const btnMore = document.createElement('button'); btnMore.className='btn'; btnMore.textContent='Näytä lisää';
    btnMore.addEventListener('click', () => { shown += 20; renderTable(si.value); });
    results.appendChild(btnMore);

    si.addEventListener('input', () => renderTable(si.value));
    renderTable('');
  }

  // Drawer
  const drawer = document.getElementById('drawer');
  const drawerTitle = document.getElementById('drawerTitle');
  const drawerBody = document.getElementById('drawerBody');
  document.getElementById('closeDrawer').addEventListener('click', () => drawer.classList.remove('open'));
  function openDetail(it) {
    drawerTitle.textContent = it.title || 'Tiedot';
    drawerBody.innerHTML = '';
    const rec = it.record || {};
    Object.entries(rec).forEach(([k,v]) => {
      const d = document.createElement('div'); d.className='row'; d.innerHTML = '<b>'+k+'</b><div>'+v+'</div>'; drawerBody.appendChild(d);
    });
    drawer.classList.add('open');
  }

  // Initial render
  renderResults(searchAll(''));

  // News carousel
  const news = DATA.Uutiset || [];
  let nidx = 0; const newsText = document.getElementById('newsText');
  function showNews(i) { if(!news.length) { newsText.textContent='Ei uutisia.'; return; } nidx=(i+news.length)%news.length; newsText.textContent=news[nidx]; }
  showNews(0);
  document.querySelector('.navbtn.prev').addEventListener('click', ()=>showNews(nidx-1));
  document.querySelector('.navbtn.next').addEventListener('click', ()=>showNews(nidx+1));
  setInterval(()=>showNews(nidx+1), 5000);
</script>
</body>
</html>
